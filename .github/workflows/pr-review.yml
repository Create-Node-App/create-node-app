name: Pull Request Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  pr-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (no autofix)
        run: npm run lint --workspaces --if-present
      - name: Type Check
        run: npm run type-check --if-present
      - name: Install Danger
        run: npm ci
        working-directory: tools/danger
      - name: Danger
        # GitHub's PR files/commits endpoints occasionally return
        # "Premature close" from the CI runner (node-fetch v2 gzip
        # handling bug on Node 24+). Retry up to 3 times and treat
        # persistent failures as advisory — Danger only posts style
        # comments on PR body/title/size, not blocking checks.
        continue-on-error: true
        working-directory: tools/danger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          attempt=1
          max=3
          until npx danger ci; do
            code=$?
            if [ $attempt -ge $max ]; then
              echo "::error::Danger failed after ${max} attempts (exit ${code})."
              exit $code
            fi
            echo "::warning::Danger attempt ${attempt} failed with exit ${code}; retrying..."
            attempt=$((attempt + 1))
            sleep 5
          done
