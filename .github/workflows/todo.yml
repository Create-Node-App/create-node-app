name: Todo Checker

on:
  push:
    branches: [main]
  schedule:
    - cron: "31 1,12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: todo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  todo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Find TODO/FIXME/HACK comments
        id: scan
        run: |
          set -euo pipefail
          # Scan all source files in tracked code. Skip generated/vendor files
          # and this workflow file (which contains the literal patterns).
          hits=$(grep -RInE 'TODO|FIXME|HACK' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            --include='*.cjs' --include='*.mts' --include='*.cts' \
            --include='*.sh' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=coverage \
            --exclude-dir=.git \
            --exclude-dir=.github \
            . || true)
          if [ -z "$hits" ]; then
            echo "No TODO/FIXME/HACK comments found."
            echo "hits=0" >> "$GITHUB_OUTPUT"
          else
            count=$(printf '%s\n' "$hits" | wc -l)
            echo "Found $count TODO/FIXME/HACK comment(s):"
            printf '%s\n' "$hits"
            echo "hits=$count" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail if TODO/FIXME/HACK are present
        if: steps.scan.outputs.hits != '0'
        run: |
          echo "::error::Found TODO/FIXME/HACK comments. Resolve or move to tracked issues before merging to main."
          exit 1
