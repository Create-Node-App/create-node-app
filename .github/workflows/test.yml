name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 1,12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (if required)
        run: npm run build --if-present
      - name: Run unit tests
        run: npm test

  # Cross-platform scaffolding tests (Node on Windows/macOS, Bun on Ubuntu)
  cross-platform-scaffold:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: bun
          - os: windows-latest
            runtime: node
          - os: macos-latest
            runtime: node
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test scaffold on ${{ matrix.os }} (${{ matrix.runtime }})
        shell: bash
        run: |
          TEMP_DIR="${RUNNER_TEMP}/scaffold-test"
          mkdir -p "$TEMP_DIR"
          cd "$TEMP_DIR"

          CLI="$GITHUB_WORKSPACE/packages/create-awesome-node-app/index.js"
          echo "Testing scaffold on ${{ matrix.os }} with ${{ matrix.runtime }}..."
          if [ "${{ matrix.runtime }}" = "bun" ]; then
            CI=true bun run "$CLI" test-project \
              -t "nextjs-starter" \
              --no-install
          else
            CI=true node "$CLI" test-project \
              -t "nextjs-starter" \
              --no-install
          fi

          if [ -d "test-project" ]; then
            echo "✅ Project created successfully on ${{ matrix.os }} (${{ matrix.runtime }})"
          else
            echo "❌ Project creation failed on ${{ matrix.os }} (${{ matrix.runtime }})"
            exit 1
          fi
        env:
          CNA_SKIP_GIT: 1
          CI: true

  coverage:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run coverage
        env:
          CNA_SKIP_GIT: 1
          SKIP_SMOKE: 1
        run: npm run test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage
            lcov.info
