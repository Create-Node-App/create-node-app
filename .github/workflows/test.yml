name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 1,12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (if required)
        run: npm run build --if-present
      - name: Run unit tests
        run: npm test

  # Cross-platform scaffolding tests (Windows & macOS)
  cross-platform-scaffold:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test scaffold on ${{ matrix.os }}
        shell: bash
        run: |
          TEMP_DIR="${RUNNER_TEMP}/scaffold-test"
          mkdir -p "$TEMP_DIR"
          cd "$TEMP_DIR"

          # Test scaffold command using locally built CLI
          echo "Testing scaffold on ${{ matrix.os }}..."
          CI=true node "$GITHUB_WORKSPACE/packages/create-awesome-node-app/index.js" test-project \
            -t "nextjs-starter" \
            --no-install

          # Verify the project was created
          if [ -d "test-project" ]; then
            echo "✅ Project created successfully on ${{ matrix.os }}"
          else
            echo "❌ Project creation failed on ${{ matrix.os }}"
            exit 1
          fi
        env:
          CNA_SKIP_GIT: 1
          CI: true

  coverage:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run coverage
        env:
          CNA_SKIP_GIT: 1
          SKIP_SMOKE: 1
        run: npm run test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage
            lcov.info
