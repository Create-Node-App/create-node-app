name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create Release Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: release-pr
    if: needs.release-pr.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: write # Required to push git tags for downstream workflows
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + existing tags so `changeset tag` can skip
          # versions that are already tagged remotely.
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install npm with trusted publishing support
        # Pin to the exact npm version declared in the root packageManager
        # field (packageManager: npm@11.13.0) so the workflow and local
        # tooling stay in lockstep.
        run: npm install -g npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Publish packages
        run: npm run publish-packages

      # Our Changesets config has "commit": false, which also disables
      # automatic tagging. Explicitly run `changeset tag` to create
      # local git tags matching every version present in the workspace
      # (e.g. create-awesome-node-app@0.12.0). It is a no-op for
      # versions already tagged in the fetched history.
      - name: Create git tags for published versions
        run: npx changeset tag

      # Push all local tags so the tag-based Docker, AUR, and Homebrew
      # workflows trigger. Lightweight tags require --tags (not
      # --follow-tags).
      - name: Push git tags
        run: git push origin --tags
