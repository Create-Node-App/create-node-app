name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create Release Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: release-pr
    if: needs.release-pr.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Exchange GitHub OIDC token for npm access token
        id: npm-token
        run: |
          GH_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          NPM_TOKEN=$(curl -sS -X POST -H "Content-Type: application/json" -d "{\"token\":\"$GH_TOKEN\"}" https://registry.npmjs.org/-/npm/v1/security/oidc-token | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "npm-token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify npm identity
        run: npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.npm-token }}

      - name: Publish packages
        run: npm run publish-packages
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.npm-token }}
          NPM_CONFIG_PROVENANCE: "true"
