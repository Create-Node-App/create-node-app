# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation

# all, none, or list of linter keys
APPLY_FIXES: all

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
# ENABLE:

# If you use ENABLE_LINTERS variable, all other linters will be disabled by
# default
# ENABLE_LINTERS:

DISABLE_LINTERS:
  - ACTION_ZIZMOR # Workflows are validated by actionlint; pinning policy needs a dedicated hardening pass
  - COPYPASTE_JSCPD
  - JAVASCRIPT_ES # Root ESLint project service does not include standalone JS config entrypoints
  - JSON_V8R # v8r flags valid tsconfig variants against generic JSON schemas
  - REPOSITORY_CHECKOV
  - REPOSITORY_GRYPE
  - REPOSITORY_OSV_SCANNER # Handled by scheduled workflow in .github/workflows/osv-scanner.yml
  - REPOSITORY_TRIVY
  - SPELL_CSPELL # cspell flags many technical terms and usernames; not blocking
  - SPELL_LYCHEE
  - TYPESCRIPT_STANDARD # eslint is the configured linter (eslint.config.cjs)
  - YAML_V8R # v8r flags GitHub issue template assignees accepted by GitHub

# DISABLE:
# - COPYPASTE # Uncomment to disable checks of excessive copy-pastes
# - SPELL # Uncomment to disable checks of spelling mistakes

# Allow zizmor to authenticate when checking referenced GitHub Actions metadata.
ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN

SHOW_ELAPSED_TIME: true
# Danger tooling is linted via its own package; exclude from root ESLint project checks.
FILTER_REGEX_EXCLUDE: (tools/danger/|fixtures/|packages/.*/completions/)
# Uncomment if you want MegaLinter to detect errors but not block CI to pass
# DISABLE_ERRORS: true
