<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Create Awesome Node App</title>
  <desc id="desc">A futuristic terminal interface showing the Create Awesome Node App workflow from templates and addons to an AI-ready production project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.45" stop-color="#101332"/>
      <stop offset="1" stop-color="#021B2D"/>
    </linearGradient>
    <linearGradient id="neon" x1="132" y1="100" x2="1130" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.48" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="panel" x1="188" y1="132" x2="1048" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="pulseA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(278 178) rotate(45) scale(420 260)">
      <stop stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulseB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1006 438) rotate(135) scale(460 280)">
      <stop stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="36" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="36" fill="url(#grid)"/>
  <rect width="1280" height="640" rx="36" fill="url(#pulseA)"/>
  <rect width="1280" height="640" rx="36" fill="url(#pulseB)"/>

  <path d="M134 486C278 366 372 385 516 458C696 550 790 522 950 356C1034 269 1108 236 1180 254" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.45"/>
  <path d="M90 206C230 108 384 110 516 194C692 306 826 276 992 154C1063 102 1132 88 1202 104" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.32"/>

  <g filter="url(#softGlow)">
    <circle cx="1022" cy="154" r="6" fill="#22D3EE"/>
    <circle cx="262" cy="492" r="5" fill="#A78BFA"/>
    <circle cx="1138" cy="418" r="4" fill="#22C55E"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="160" y="96" width="960" height="448" rx="28" fill="url(#panel)" stroke="url(#neon)" stroke-opacity="0.72"/>
    <rect x="160" y="96" width="960" height="70" rx="28" fill="#0F172A" fill-opacity="0.78"/>
    <circle cx="204" cy="132" r="8" fill="#EF4444"/>
    <circle cx="232" cy="132" r="8" fill="#F59E0B"/>
    <circle cx="260" cy="132" r="8" fill="#22C55E"/>
    <text x="640" y="139" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">create-awesome-node-app</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="210" y="226" fill="#F8FAFC" font-size="46" font-weight="800" letter-spacing="-1.8">One command.</text>
    <text x="210" y="278" fill="#F8FAFC" font-size="46" font-weight="800" letter-spacing="-1.8">Your stack.</text>
    <text x="210" y="330" fill="url(#neon)" font-size="46" font-weight="900" letter-spacing="-1.8">Ready to ship.</text>
    <text x="212" y="374" fill="#94A3B8" font-size="21" font-weight="500">Composable scaffolding for Node, Web, Full-Stack,</text>
    <text x="212" y="404" fill="#94A3B8" font-size="21" font-weight="500">Monorepos, WebExtensions, and AI-assisted teams.</text>

    <rect x="210" y="438" width="454" height="56" rx="16" fill="#020617" stroke="#22D3EE" stroke-opacity="0.46"/>
    <text x="238" y="473" fill="#22D3EE" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="20" font-weight="700">$ npm create awesome-node-app@latest</text>
  </g>

  <g filter="url(#cardShadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="724" y="206" width="334" height="72" rx="18" fill="#0B1226" stroke="#8B5CF6" stroke-opacity="0.55"/>
    <circle cx="760" cy="242" r="16" fill="#8B5CF6" fill-opacity="0.18" stroke="#A78BFA"/>
    <path d="M753 242H767M760 235V249" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
    <text x="790" y="238" fill="#F8FAFC" font-size="19" font-weight="800">Pick a template</text>
    <text x="790" y="263" fill="#94A3B8" font-size="15">React, Next.js, NestJS, Turborepo...</text>

    <rect x="774" y="300" width="334" height="72" rx="18" fill="#0B1226" stroke="#06B6D4" stroke-opacity="0.55"/>
    <circle cx="810" cy="336" r="16" fill="#06B6D4" fill-opacity="0.18" stroke="#67E8F9"/>
    <path d="M804 336H816M810 330V342" stroke="#A5F3FC" stroke-width="2" stroke-linecap="round"/>
    <text x="840" y="332" fill="#F8FAFC" font-size="19" font-weight="800">Layer addons</text>
    <text x="840" y="357" fill="#94A3B8" font-size="15">Tailwind, CI, auth, data, testing...</text>

    <rect x="724" y="394" width="334" height="72" rx="18" fill="#0B1226" stroke="#22C55E" stroke-opacity="0.55"/>
    <circle cx="760" cy="430" r="16" fill="#22C55E" fill-opacity="0.18" stroke="#86EFAC"/>
    <path d="M752 430L758 436L769 424" stroke="#BBF7D0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="790" y="426" fill="#F8FAFC" font-size="19" font-weight="800">Ship AI-ready code</text>
    <text x="790" y="451" fill="#94A3B8" font-size="15">AGENTS.md, scripts, CI, conventions.</text>
  </g>

  <g opacity="0.88" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14" font-weight="700">
    <rect x="746" y="132" width="96" height="26" rx="13" fill="#8B5CF6" fill-opacity="0.18" stroke="#A78BFA" stroke-opacity="0.5"/>
    <text x="794" y="151" text-anchor="middle" fill="#C4B5FD">TEMPLATE</text>
    <rect x="858" y="132" width="86" height="26" rx="13" fill="#06B6D4" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5"/>
    <text x="901" y="151" text-anchor="middle" fill="#A5F3FC">ADDONS</text>
    <rect x="960" y="132" width="100" height="26" rx="13" fill="#22C55E" fill-opacity="0.18" stroke="#86EFAC" stroke-opacity="0.5"/>
    <text x="1010" y="151" text-anchor="middle" fill="#BBF7D0">AI READY</text>
  </g>
</svg>
