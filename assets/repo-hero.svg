<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Create Node App Monorepo</title>
  <desc id="desc">Hero banner for the Create Node App repository showing CLI, core engine, templates catalog, and contribution workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081226"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#06263A"/>
    </linearGradient>
    <linearGradient id="edge" x1="140" y1="92" x2="1120" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="panel" x1="126" y1="90" x2="1154" y2="554" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.97"/>
    </linearGradient>
    <radialGradient id="pulseA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 170) rotate(38) scale(540 310)">
      <stop stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulseB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 438) rotate(142) scale(560 330)">
      <stop stop-color="#4ADE80" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#4ADE80" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-22%" y="-24%" width="144%" height="148%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="640" rx="34" fill="url(#pulseA)"/>
  <rect width="1280" height="640" rx="34" fill="url(#pulseB)"/>

  <path d="M102 480C272 340 406 354 556 444C708 536 842 500 1004 332C1068 264 1132 228 1192 242" stroke="url(#edge)" stroke-opacity="0.38" stroke-width="2"/>
  <path d="M84 218C250 108 404 114 566 206C728 298 848 282 1022 164C1082 124 1144 106 1202 116" stroke="url(#edge)" stroke-opacity="0.3" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="126" y="90" width="1028" height="462" rx="30" fill="url(#panel)" stroke="url(#edge)" stroke-opacity="0.7"/>
    <rect x="126" y="90" width="1028" height="74" rx="30" fill="#0B1226" fill-opacity="0.84"/>
    <circle cx="176" cy="126" r="8" fill="#EF4444"/>
    <circle cx="204" cy="126" r="8" fill="#F59E0B"/>
    <circle cx="232" cy="126" r="8" fill="#22C55E"/>
    <text x="640" y="132" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">create-node-app monorepo</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="176" y="184" width="188" height="40" rx="20" fill="#0EA5E9" fill-opacity="0.2" stroke="#67E8F9" stroke-opacity="0.56"/>
    <text x="270" y="210" text-anchor="middle" fill="#CFFAFE" font-size="15" font-weight="800" letter-spacing="0.6">OPEN SOURCE CLI</text>

    <text x="176" y="286" fill="#F8FAFC" font-size="56" font-weight="900" letter-spacing="-1.6">Build production starters.</text>
    <text x="176" y="344" fill="#E2E8F0" font-size="46" font-weight="800" letter-spacing="-1.2">Contribute with confidence.</text>
    <text x="176" y="392" fill="#94A3B8" font-size="24" font-weight="500">CLI + core engine + shared configs + template ecosystem.</text>
  </g>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    <rect x="176" y="432" width="548" height="54" rx="14" fill="#020617" stroke="#22D3EE" stroke-opacity="0.58"/>
    <text x="204" y="465" fill="#67E8F9" font-size="19" font-weight="700">npm create awesome-node-app@latest my-app</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="800">
    <rect x="760" y="198" width="166" height="40" rx="20" fill="#0EA5E9" fill-opacity="0.17" stroke="#67E8F9" stroke-opacity="0.6"/>
    <text x="843" y="223" text-anchor="middle" fill="#CFFAFE">CLI APP</text>
    <rect x="954" y="198" width="166" height="40" rx="20" fill="#22C55E" fill-opacity="0.17" stroke="#86EFAC" stroke-opacity="0.64"/>
    <text x="1037" y="223" text-anchor="middle" fill="#DCFCE7">CORE ENGINE</text>
    <rect x="760" y="262" width="360" height="40" rx="20" fill="#F59E0B" fill-opacity="0.14" stroke="#FCD34D" stroke-opacity="0.6"/>
    <text x="940" y="287" text-anchor="middle" fill="#FEF3C7">TEMPLATES + EXTENSIONS CATALOG</text>
    <rect x="760" y="326" width="360" height="40" rx="20" fill="#6366F1" fill-opacity="0.14" stroke="#A5B4FC" stroke-opacity="0.6"/>
    <text x="940" y="351" text-anchor="middle" fill="#E0E7FF">CONTRIBUTING + CI + DOCUMENTATION</text>
    <rect x="760" y="390" width="260" height="40" rx="20" fill="#22C55E" fill-opacity="0.14" stroke="#86EFAC" stroke-opacity="0.64"/>
    <text x="890" y="415" text-anchor="middle" fill="#DCFCE7">READY FOR COMMUNITY</text>
  </g>
</svg>
